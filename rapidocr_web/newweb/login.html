<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RapidOCR - 用户登录</title>
    <link rel="stylesheet" href="./css/auth.css">
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <h1 class="auth-title">RapidOCR 用户登录</h1>
        <div class="auth-divider"></div>

        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名" required>
                <span class="error-msg" id="usernameError"></span>
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" required>
                <span class="error-msg" id="passwordError"></span>
            </div>

            <button type="submit" class="btn-primary" id="loginBtn">登 录</button>
        </form>

        <div class="auth-links">
            <a href="./register.html" class="link-secondary">没有账号？立即注册</a>
        </div>
    </div>
</div>
<script src="./js/auth.js"></script>
</body>
</html>
