<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RapidOCR - 新用户注册</title>
    <link rel="stylesheet" href="./css/auth.css">
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <h1 class="auth-title">新用户注册</h1>
        <div class="auth-divider"></div>

        <form id="registerForm" novalidate>
            <div class="form-group">
                <label for="regUsername">用户名</label>
                <input type="text" id="regUsername" name="username" placeholder="3-20位字母数字下划线" required>
                <span class="error-msg" id="regUsernameError"></span>
            </div>

            <div class="form-group">
                <label for="regPassword">密码</label>
                <input type="password" id="regPassword" name="password" placeholder="至少6位，含字母和数字" required>
                <span class="error-msg" id="regPasswordError"></span>
            </div>

            <div class="form-group">
                <label for="confirmPassword">确认密码</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="请再次输入密码" required>
                <span class="error-msg" id="confirmPasswordError"></span>
            </div>

            <button type="submit" class="btn-primary" id="registerBtn">注 册</button>
        </form>

        <div class="auth-links">
            <a href="./login.html" class="link-secondary">已有账号？立即登录</a>
        </div>
    </div>
</div>
<script src="./js/auth.js"></script>
</body>
</html>
